{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}

{% block content %}
<div class="card card-pad animate-in" style="max-width:420px;margin:48px auto;text-align:center">
  <p style="font-size:48px;font-weight:700;margin:0 0 8px;letter-spacing:-0.04em">{{ code }}</p>
  <h1 class="page-title" style="font-size:20px">Something went wrong</h1>
  <p class="page-lead" style="margin:0 auto 24px">{{ message }}</p>
  <a href="/" class="btn btn-primary" style="width:auto;display:inline-flex">Back home</a>
</div>
{% endblock %}
